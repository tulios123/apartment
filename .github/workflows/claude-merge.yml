name: Claude merge

# One-tap "merge & publish" from the app. The merge-feedback-pr edge function labels a
# claude-fix/<issue> PR with `claude-merge` (it only holds an Issues-scoped PAT, which can
# label but not merge). That label fires this workflow, which merges with the built-in
# GITHUB_TOKEN (contents + pull-requests write, granted below). On merge, claude-fix-merged.yml
# flips the feedback item to 'fixed' and production auto-deploys from main.
on:
  pull_request:
    types: [labeled]

# Never run two merges at once; don't cancel one mid-flight.
concurrency:
  group: claude-merge
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    # Only our own fix branches, only when the owner-approved merge label lands.
    if: github.event.label.name == 'claude-merge' && startsWith(github.event.pull_request.head.ref, 'claude-fix/')
    runs-on: ubuntu-latest
    steps:
      - name: Merge the fix PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Squash-merge and delete the branch. claude-fix-merged.yml (on pull_request closed
          # + merged) marks the feedback item fixed; the "Fixes #N" body closes the issue.
          gh pr merge "$PR" --repo "$REPO" --squash --delete-branch
