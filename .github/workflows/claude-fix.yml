name: Claude auto-fix

# Fires when the feedback pipeline (or Itai) adds the `claude-fix` label to an issue.
on:
  issues:
    types: [labeled]

# One auto-fix run at a time (safety belt; the real single-run lock is the admin UI).
# Do NOT cancel an in-progress run — let it finish.
concurrency:
  group: claude-autofix
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  FUNCTIONS_URL: https://bjholzkesnzkbogxmurw.supabase.co/functions/v1

jobs:
  autofix:
    if: github.event.label.name == 'claude-fix'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1) Status → in_progress.
      - name: Mark in_progress
        run: |
          curl -sf -X POST "$FUNCTIONS_URL/update-feedback-status" \
            -H "X-Pipeline-Secret: ${{ secrets.PIPELINE_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"github_issue_number\": ${{ github.event.issue.number }}, \"status\": \"in_progress\"}" || true

      # 2) Pull EVERY signed 'Screenshot: <url>' line out of the issue body and download it,
      #    so Claude can see all the images the reporter attached.
      - name: Download screenshots
        id: shot
        env:
          BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p "$RUNNER_TEMP/shots"
          n=0
          # Hard-restrict the host to our Supabase storage so a user note can't point the
          # runner at an arbitrary URL (SSRF); non-matching lines are skipped.
          while IFS= read -r line; do
            url=$(printf '%s' "$line" | sed 's/^Screenshot: //' | tr -d '\r')
            case "$url" in
              https://bjholzkesnzkbogxmurw.supabase.co/storage/*) ;;
              *) continue ;;
            esac
            ext=$(printf '%s' "$url" | sed -E 's/\?.*$//' | grep -oE '\.[a-zA-Z0-9]+$' || echo ".png")
            [ -z "$ext" ] && ext=".png"
            n=$((n+1))
            # `if` (not `&&`) so a single failed download can't abort the step under set -e.
            if curl -sfL "$url" -o "$RUNNER_TEMP/shots/shot-$n$ext"; then echo "Downloaded screenshot $n"; fi
          done < <(printf '%s' "$BODY" | grep -oE '^Screenshot: .+' || true)
          if [ "$n" -gt 0 ]; then echo "dir=$RUNNER_TEMP/shots" >> "$GITHUB_OUTPUT"; fi

      # 2b) Pull the issue conversation (the owner's guidance/answers + Claude's earlier
      #     replies) so a follow-up run CONTINUES the chat instead of restarting from the
      #     original report. This is what turns the pipeline into a real back-and-forth.
      - name: Fetch conversation
        id: convo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE=${{ github.event.issue.number }}
          gh issue view "$ISSUE" --repo "${{ github.repository }}" --json comments \
            --jq '.comments[] | "--- \(.author.login) ---\n\(.body)\n"' > "$RUNNER_TEMP/comments.txt" || true
          echo "path=$RUNNER_TEMP/comments.txt" >> "$GITHUB_OUTPUT"

      # 3) Run Claude Code to fix the bug and open a PR (Opus 4.8 — the owner's most
      #    important system; worth the strongest model for hard fixes + good back-and-forth).
      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Git push + PR are authenticated with the workflow token (permissions granted
          # above). Without this the branch/PR can't be created and a good fix reads as failed.
          github_token: ${{ github.token }}
          # CI is non-interactive — allow Claude to edit/write/run without a human
          # approval prompt (a good fix otherwise stalls on "edit permission denied").
          # Safe here: the run is sandboxed and every change is reviewed at the PR stage.
          claude_args: "--model opus --max-turns 80 --dangerously-skip-permissions"
          show_full_output: true
          prompt: |
            A bug/idea was reported in the apartment-management app (a Hebrew, RTL, mobile
            React + Supabase PWA). Everything you need is below.

            Issue number: ${{ github.event.issue.number }}
            Screenshots directory — all images the reporter attached; may be empty: ${{ steps.shot.outputs.dir }}
            Conversation so far — the owner's guidance/answers + your earlier replies; may be
            empty on the first round: ${{ steps.convo.outputs.path }}

            Issue body:
            ${{ github.event.issue.body }}

            This may be a FOLLOW-UP round: the owner talks to you from inside the app, and
            their guidance/answers arrive as issue comments (in the conversation file above).
            If a branch named claude-fix/${{ github.event.issue.number }} already exists on
            origin, CHECK IT OUT and CONTINUE the work on it — do not start over.

            Work DIRECTLY and autonomously in this single session: read files and fix the code
            YOURSELF. Do NOT spawn sub-agents or a Task/exploration tool — just do the work to
            completion. Be efficient: the fix is usually small.

            Do this:
            1. Read everything above, including EVERY image in the screenshots directory and
               the conversation file, and ADDRESS the owner's latest guidance. Locate the
               root cause in the code.
            2. Fix it minimally, following the repo's conventions (CLAUDE.md, SKILL.md).
            3. Run `npm ci` once, then `npm test` — the suite must be green.
            4. Add a regression test IF the bug has testable logic (skip for pure CSS).
            5. Open (or update) a pull request from branch
               claude-fix/${{ github.event.issue.number }}, with
               "Fixes #${{ github.event.issue.number }}" in the body. NEVER push to main.
            6. If you CAN'T reproduce it or need the owner to decide something, do NOT guess
               and do NOT open a PR — ask the specific question instead.
            7. ALWAYS, as your FINAL step, write a SHORT Hebrew message (1-3 sentences) to the
               file ${{ runner.temp }}/bot_reply.txt — either "what I fixed + what to check",
               or the specific question you need answered. This is shown to the owner in the
               app's bot chat, so write it to them directly, in plain Hebrew.

      # 3b) Deploy the fix branch to a PRIVATE Cloudflare preview so the owner can test the
      #     fix on their phone BEFORE merging (production only deploys from main). The alias
      #     URL (https://claude-fix-<issue>.<project-subdomain>.pages.dev) is captured from
      #     wrangler's output and reported to the console. Best-effort (continue-on-error):
      #     a preview hiccup must never mark a good fix as failed.
      - name: Deploy preview
        if: success()
        continue-on-error: true
        env:
          ISSUE: ${{ github.event.issue.number }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Public VAPID key (ships in the bundle anyway) — same value as deploy.yml.
          VITE_VAPID_PUBLIC_KEY: BC37k0Kv1s503cBFIfhAop05sPFlTJ4h9ZjvjWasmGQ6GZ04nT3-FO2Zq0BtTpuibti9utXxhCf33kaijGC_SaA
        id: preview
        run: |
          # Only if Claude actually pushed a fix branch (not just questions on the issue).
          if git ls-remote --exit-code --heads origin "claude-fix/$ISSUE" >/dev/null 2>&1; then
            git fetch origin "claude-fix/$ISSUE"
            # Build the fix branch IN PLACE. Claude already left the job checkout on this
            # branch (which is why a worktree add fails — the ref is already checked out),
            # and the only later step reads the PR via `gh` + a temp file, never the tree —
            # so building here is safe. -B resets the local branch to the pushed tip.
            git checkout -B "claude-fix/$ISSUE" "origin/claude-fix/$ISSUE"
            npm ci
            npm run build:prod
            # A real prod build (no dev auth bypass) against the SAME Supabase backend, so
            # the owner logs in as themselves and tests the fix on live data before merging.
            # Capture the REAL alias URL from wrangler's output — the project's pages.dev
            # subdomain carries a suffix (apartment-6s4.pages.dev), so it must not be hardcoded.
            out=$(npx wrangler pages deploy dist --project-name=apartment --branch="claude-fix-$ISSUE" --commit-dirty=true 2>&1)
            printf '%s\n' "$out"
            alias=$(printf '%s' "$out" | grep -oE "https://claude-fix-$ISSUE\.[a-z0-9-]+\.pages\.dev" | head -1)
            # Emit the preview URL only for a real, parsed alias (set -e already aborted on a
            # wrangler failure) — so the console never shows a dead button.
            [ -n "$alias" ] && echo "url=$alias" >> "$GITHUB_OUTPUT"
          else
            echo "No fix branch for #$ISSUE — skipping preview."
          fi

      # 4) Status → awaiting_review (+ PR URL) if a PR was opened, else failed
      #    (e.g. Claude posted questions instead of a fix).
      - name: Mark awaiting_review or failed
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE=${{ github.event.issue.number }}
          pr_url=$(gh pr list --repo "${{ github.repository }}" --head "claude-fix/$ISSUE" --state open --json url --jq '.[0].url // ""')
          # The bot's reply to the owner (what it fixed / what it needs) → surfaced in the
          # app's bot chat as a 'bot' message. Build the JSON with jq so quotes/newlines in
          # the reply can't break it.
          reply="$(cat "$RUNNER_TEMP/bot_reply.txt" 2>/dev/null || true)"
          prev="${{ steps.preview.outputs.url }}"
          if [ -n "$pr_url" ]; then status="awaiting_review"; else status="failed"; fi
          payload=$(jq -n --argjson issue "$ISSUE" --arg status "$status" --arg pr "$pr_url" --arg bot "$reply" --arg prev "$prev" \
            '{github_issue_number: $issue, status: $status}
             + (if $pr   != "" then {pr_url: $pr}        else {} end)
             + (if $bot  != "" then {bot_message: $bot}  else {} end)
             + (if $prev != "" then {preview_url: $prev} else {} end)')
          curl -sf -X POST "$FUNCTIONS_URL/update-feedback-status" \
            -H "X-Pipeline-Secret: ${{ secrets.PIPELINE_SECRET }}" -H "Content-Type: application/json" \
            -d "$payload" || true

      # 5) Any real failure of the run → failed.
      - name: Mark failed
        if: failure()
        run: |
          curl -sf -X POST "$FUNCTIONS_URL/update-feedback-status" \
            -H "X-Pipeline-Secret: ${{ secrets.PIPELINE_SECRET }}" -H "Content-Type: application/json" \
            -d "{\"github_issue_number\": ${{ github.event.issue.number }}, \"status\": \"failed\"}" || true
