name: Claude auto-fix

# Fires when the feedback pipeline (or Itai) adds the `claude-fix` label to an issue.
on:
  issues:
    types: [labeled]

# One auto-fix run at a time (safety belt; the real single-run lock is the admin UI).
# Do NOT cancel an in-progress run — let it finish.
concurrency:
  group: claude-autofix
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write   # to dispatch deploy-staging after the merge (a GITHUB_TOKEN push won't)

env:
  FUNCTIONS_URL: https://bjholzkesnzkbogxmurw.supabase.co/functions/v1

jobs:
  autofix:
    if: github.event.label.name == 'claude-fix'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          # Fixes now flow into the `staging` branch (auto-merged), and only reach production
          # when the owner promotes. Claude branches off staging and opens its PR against it.
          ref: staging
          fetch-depth: 0

      # 1) Status → in_progress.
      - name: Mark in_progress
        run: |
          curl -sf -X POST "$FUNCTIONS_URL/update-feedback-status" \
            -H "X-Pipeline-Secret: ${{ secrets.PIPELINE_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"github_issue_number\": ${{ github.event.issue.number }}, \"status\": \"in_progress\"}" || true

      # 2) Pull EVERY signed 'Screenshot: <url>' line out of the issue BODY *and its COMMENTS*
      #    and download it, so Claude sees images the reporter attached on the first report AND
      #    screenshots the owner attaches MID-conversation (send-bot-followup posts them as a
      #    comment). Both are scanned so a follow-up round gets the new images too.
      - name: Download screenshots
        id: shot
        env:
          BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p "$RUNNER_TEMP/shots"
          comments=$(gh issue view "$ISSUE" --repo "$REPO" --json comments --jq '.comments[].body' 2>/dev/null || true)
          n=0
          # Hard-restrict the host to our Supabase storage so a user note can't point the
          # runner at an arbitrary URL (SSRF); non-matching lines are skipped.
          while IFS= read -r line; do
            url=$(printf '%s' "$line" | sed 's/^Screenshot: //' | tr -d '\r')
            case "$url" in
              https://bjholzkesnzkbogxmurw.supabase.co/storage/*) ;;
              *) continue ;;
            esac
            ext=$(printf '%s' "$url" | sed -E 's/\?.*$//' | grep -oE '\.[a-zA-Z0-9]+$' || echo ".png")
            [ -z "$ext" ] && ext=".png"
            n=$((n+1))
            # `if` (not `&&`) so a single failed download can't abort the step under set -e.
            if curl -sfL "$url" -o "$RUNNER_TEMP/shots/shot-$n$ext"; then echo "Downloaded screenshot $n"; fi
          done < <(printf '%s\n%s' "$BODY" "$comments" | grep -oE '^Screenshot: .+' || true)
          if [ "$n" -gt 0 ]; then echo "dir=$RUNNER_TEMP/shots" >> "$GITHUB_OUTPUT"; fi

      # 2b) Pull the issue conversation (the owner's guidance/answers + Claude's earlier
      #     replies) so a follow-up run CONTINUES the chat instead of restarting from the
      #     original report. This is what turns the pipeline into a real back-and-forth.
      - name: Fetch conversation
        id: convo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE=${{ github.event.issue.number }}
          gh issue view "$ISSUE" --repo "${{ github.repository }}" --json comments \
            --jq '.comments[] | "--- \(.author.login) ---\n\(.body)\n"' > "$RUNNER_TEMP/comments.txt" || true
          echo "path=$RUNNER_TEMP/comments.txt" >> "$GITHUB_OUTPUT"

      # 2c) Live heartbeat → the console. The next step (Run Claude) is one long opaque
      #     block; a bot-channel note here arrives instantly via realtime so the owner sees
      #     the bot start working instead of a frozen "בעבודה" spinner.
      - name: Heartbeat — analyzing
        run: |
          curl -sf -X POST "$FUNCTIONS_URL/update-feedback-status" \
            -H "X-Pipeline-Secret: ${{ secrets.PIPELINE_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"github_issue_number\": ${{ github.event.issue.number }}, \"bot_message\": \"🔎 קורא את הדיווח, הצילומים וההנחיות — מאתר את מקור הבעיה בקוד ומתחיל לתקן…\"}" || true

      # 3) Run Claude Code to fix the bug and open a PR (Opus 4.8 — the owner's most
      #    important system; worth the strongest model for hard fixes + good back-and-forth).
      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Git push + PR are authenticated with the workflow token (permissions granted
          # above). Without this the branch/PR can't be created and a good fix reads as failed.
          github_token: ${{ github.token }}
          # CI is non-interactive — allow Claude to edit/write/run without a human
          # approval prompt (a good fix otherwise stalls on "edit permission denied").
          # Safe here: the run is sandboxed and every change is reviewed at the PR stage.
          claude_args: "--model opus --max-turns 80 --dangerously-skip-permissions"
          show_full_output: true
          prompt: |
            A bug/idea was reported in the apartment-management app (a Hebrew, RTL, mobile
            React + Supabase PWA). Everything you need is below.

            Issue number: ${{ github.event.issue.number }}
            Screenshots directory — all images the reporter attached; may be empty: ${{ steps.shot.outputs.dir }}
            Conversation so far — the owner's guidance/answers + your earlier replies; may be
            empty on the first round: ${{ steps.convo.outputs.path }}

            Issue body:
            ${{ github.event.issue.body }}

            This repo is checked out on the `staging` branch. Your PR targets `staging` and is
            auto-merged once it opens (tests must be green). It will NOT reach production until
            the owner presses "פרסם לכולם" — so never push to main; base everything on staging.

            This may be a FOLLOW-UP round: the owner talks to you from inside the app, and
            their guidance/answers arrive as issue comments (in the conversation file above).
            If a branch named claude-fix/${{ github.event.issue.number }} already exists on
            origin, CHECK IT OUT and CONTINUE the work on it — do not start over.

            Work DIRECTLY and autonomously in this single session: read files and fix the code
            YOURSELF. Do NOT spawn sub-agents or a Task/exploration tool — just do the work to
            completion. Be efficient: the fix is usually small.

            Do this:
            1. Read everything above, including EVERY image in the screenshots directory and
               the conversation file, and ADDRESS the owner's latest guidance. Locate the
               root cause in the code.
            2. Fix it minimally, following the repo's conventions (CLAUDE.md, SKILL.md).
            3. Run `npm ci` once, then `npm test` — the suite must be green.
            4. Add a regression test IF the bug has testable logic (skip for pure CSS).
            5. If the fix needs a DB migration, it MUST be ADDITIVE and backward-compatible
               (new nullable columns / new tables / widened checks only — never drop/rename a
               column, never add NOT NULL without a default, never tighten a constraint). The
               staging code and production code share ONE database, so a non-additive change
               would break the live app. If only a non-additive change would truly fix it, do
               NOT write it — explain that in your reply so the owner can plan a manual release.
            6. Open (or update) a pull request from branch
               claude-fix/${{ github.event.issue.number }} with BASE branch `staging`, and
               "Fixes #${{ github.event.issue.number }}" in the body. NEVER push to main.
            7. If you CAN'T reproduce it or need the owner to decide something, do NOT guess
               and do NOT open a PR — ask the specific question instead.
            8. ALWAYS, as your FINAL step, write a SHORT Hebrew message (1-3 sentences) to the
               file ${{ runner.temp }}/bot_reply.txt. Write it like a helpful human teammate
               texting the owner — warm, natural, first-person, and SPECIFIC. Name the exact
               screen/behavior you changed and tell them precisely what to check in the app; if
               you need a decision, ask ONE clear question. Plain conversational Hebrew — NOT a
               robotic template, no headings, no "בוצע:"/"סטטוס:"-style labels, no English.

      # 3b) Heartbeat before the merge, so the console shows the fix is done and landing in the
      #     workspace — not silence between "עובד" and "בבדיקות". The actual staging DEPLOY is
      #     done by deploy-staging.yml, dispatched EXPLICITLY after the merge below (a merge push
      #     by GITHUB_TOKEN does NOT trigger it) — this workflow no longer builds it inline.
      - name: Heartbeat — merging to staging
        if: success()
        run: |
          curl -sf -X POST "$FUNCTIONS_URL/update-feedback-status" \
            -H "X-Pipeline-Secret: ${{ secrets.PIPELINE_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"github_issue_number\": ${{ github.event.issue.number }}, \"bot_message\": \"🔨 סיימתי לתקן — ממזג לסביבת־הבדיקות (staging), עוד רגע תוכל לבדוק שם לפני שדוחפים לכולם…\"}" || true

      # 4) Auto-merge the fix into `staging` → item becomes in_staging (בבדיקות): the fix now
      #    lives in the workspace, waiting for the owner to "פרסם לכולם". The human gate is the
      #    promote, not this merge — tests already ran green inside Claude's task. If the merge
      #    can't go through (conflict / not mergeable) → awaiting_review ("דורש טיפול") with an
      #    explanatory PR comment. If Claude opened NO PR (asked a question) → failed. The merge
      #    to staging is unrestricted (only `main` carries a ruleset), so GITHUB_TOKEN can do it.
      - name: Merge to staging + set status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          reply="$(cat "$RUNNER_TEMP/bot_reply.txt" 2>/dev/null || true)"
          pr=$(gh pr list --repo "$REPO" --head "claude-fix/$ISSUE" --base staging --state open --json number --jq '.[0].number // ""')
          pr_url=$(gh pr list --repo "$REPO" --head "claude-fix/$ISSUE" --base staging --state open --json url --jq '.[0].url // ""')
          if [ -z "$pr" ]; then
            status="failed"
          else
            # Retry once — GitHub may not have computed mergeability the instant the PR opens.
            merged=0
            for attempt in 1 2; do
              if gh pr merge "$pr" --repo "$REPO" --squash --delete-branch 2> "$RUNNER_TEMP/merge_err.txt"; then merged=1; break; fi
              sleep 8
            done
            if [ "$merged" = 1 ]; then
              # "Fixes #N" auto-close only fires on merges to the DEFAULT branch, so close it here.
              gh issue close "$ISSUE" --repo "$REPO" --reason completed || true
              # CRITICAL: a push to staging made by GITHUB_TOKEN does NOT trigger deploy-staging.yml
              # (GitHub blocks token pushes from starting workflows, to avoid loops). Without this
              # the fix merges into the staging BRANCH but staging.<sub>.pages.dev stays STALE and
              # the owner "doesn't see the fix". Explicitly dispatch the staging deploy.
              gh workflow run deploy-staging.yml --repo "$REPO" --ref staging || true
              status="in_staging"
            else
              err="$(head -c 500 "$RUNNER_TEMP/merge_err.txt" 2>/dev/null || true)"
              gh pr comment "$pr" --repo "$REPO" --body "$(printf 'המיזוג האוטומטי ל-staging נכשל — צריך טיפול ידני.\n\n```\n%s\n```' "$err")" || true
              status="awaiting_review"
            fi
          fi
          # Surface the bot's reply in the app chat (jq builds the JSON so quotes/newlines are safe).
          payload=$(jq -n --argjson issue "$ISSUE" --arg status "$status" --arg pr "$pr_url" --arg bot "$reply" \
            '{github_issue_number: $issue, status: $status}
             + (if $pr  != "" then {pr_url: $pr}       else {} end)
             + (if $bot != "" then {bot_message: $bot} else {} end)')
          curl -sf -X POST "$FUNCTIONS_URL/update-feedback-status" \
            -H "X-Pipeline-Secret: ${{ secrets.PIPELINE_SECRET }}" -H "Content-Type: application/json" \
            -d "$payload" || true

      # 5) Any real failure of the run → failed.
      - name: Mark failed
        if: failure()
        run: |
          curl -sf -X POST "$FUNCTIONS_URL/update-feedback-status" \
            -H "X-Pipeline-Secret: ${{ secrets.PIPELINE_SECRET }}" -H "Content-Type: application/json" \
            -d "{\"github_issue_number\": ${{ github.event.issue.number }}, \"status\": \"failed\"}" || true
